services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      NEURALSCOPE_DB_PATH: /app/data/neuralscope.sqlite3
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8030:8030"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      PORT: 8110
    depends_on:
      - backend
    ports:
      - "8110:8110"
